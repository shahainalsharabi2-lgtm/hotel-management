<div class="login-page" dir="rtl">
  <div class="login-page__bg" aria-hidden="true">
    <div class="login-page__blob login-page__blob--1"></div>
    <div class="login-page__blob login-page__blob--2"></div>
  </div>

  <div class="login-card">
    <header class="login-card__brand">
      <div class="login-card__logo-wrap" *ngIf="hotelImageSrc">
        <img [src]="hotelImageSrc" alt="" class="login-card__logo" />
      </div>
      <div class="login-card__logo-fallback" *ngIf="!hotelImageSrc">{{ hotelNameInitial }}</div>
      <h1 class="login-card__title">{{ hotelDisplayName }}</h1>
      <p class="login-card__subtitle">{{ ui.screenText('login', 'pageSubtitle') }}</p>
    </header>

    <form class="login-form" (ngSubmit)="submit()">
      <label class="login-field">
        <span class="login-field__label">{{ ui.screenText('login', 'userNameLabel') }}</span>
        <div class="login-field__input-wrap">
          <i class="fas fa-user login-field__icon" aria-hidden="true"></i>
          <input
            type="text"
            name="username"
            [(ngModel)]="userName"
            autocomplete="username"
            dir="ltr"
            [placeholder]="ui.screenText('login', 'userNamePh')"
            [disabled]="loading" />
        </div>
      </label>

      <label class="login-field">
        <span class="login-field__label">{{ ui.screenText('login', 'passwordLabel') }}</span>
        <div class="login-field__input-wrap login-field__input-wrap--password">
          <i class="fas fa-lock login-field__icon" aria-hidden="true"></i>
          <input
            [type]="showPassword ? 'text' : 'password'"
            name="password"
            [(ngModel)]="password"
            autocomplete="current-password"
            dir="ltr"
            [placeholder]="ui.screenText('login', 'passwordPh')"
            [disabled]="loading" />
          <button
            type="button"
            class="login-field__toggle"
            (click)="togglePasswordVisible()"
            [attr.aria-label]="
              showPassword ? ui.screenText('login', 'hidePassword') : ui.screenText('login', 'showPassword')
            ">
            <i class="fas" [class.fa-eye]="!showPassword" [class.fa-eye-slash]="showPassword" aria-hidden="true"></i>
          </button>
        </div>
      </label>

      <p class="login-form__error" *ngIf="errorMessage" role="alert">
        <i class="fas fa-exclamation-circle" aria-hidden="true"></i>
        {{ errorMessage }}
      </p>

      <button type="submit" class="login-form__submit" [disabled]="loading">
        <i class="fas" [class.fa-spinner]="loading" [class.fa-spin]="loading" [class.fa-sign-in-alt]="!loading" aria-hidden="true"></i>
        <span>{{ loading ? ui.screenText('login', 'submitting') : ui.screenText('login', 'submitBtn') }}</span>
      </button>
    </form>

    <footer class="login-card__footer">
      <span>{{ ui.screenText('login', 'footerHint') }}</span>
    </footer>
  </div>
</div>
