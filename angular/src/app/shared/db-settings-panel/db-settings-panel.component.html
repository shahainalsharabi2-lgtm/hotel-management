<div class="db-panel-root" *ngIf="open" (click)="onBackdropClick()">
  <aside
    class="db-panel"
    role="dialog"
    [attr.aria-label]="ui.chromeLabel('dbSettingsPanelAria')"
    (click)="onPanelClick($event)">
    <button
      type="button"
      class="db-panel__close"
      (click)="requestClose()"
      [attr.aria-label]="ui.chromeLabel('dbPanelCloseAria')">
      <i class="fas fa-times" aria-hidden="true"></i>
    </button>

    <header class="db-panel__header">
      <div class="db-panel__avatar" aria-hidden="true">
        <span class="db-panel__avatar-initial">{{ userInitial }}</span>
      </div>
      <p class="db-panel__user-name">{{ userLabel || ui.chromeLabel('dbDefaultUser') }}</p>
      <h2 class="db-panel__title">{{ ui.chromeLabel('dbSettingsTitle') }}</h2>
    </header>

    <nav class="db-panel__actions" [attr.aria-label]="ui.chromeLabel('dbSettingsTitle')">
      <button
        type="button"
        class="db-panel__action db-panel__action--users"
        [disabled]="backupLoading || updateLoading"
        (click)="openUserAccounts()">
        <span class="db-panel__action-icon" aria-hidden="true">
          <i class="fas fa-users-cog"></i>
        </span>
        <span class="db-panel__action-text">
          <span class="db-panel__action-label">{{ ui.screenText('settings', 'tabUserManagement') }}</span>
          <span class="db-panel__action-hint">{{ ui.chromeLabel('dbUsersLinkHint') }}</span>
        </span>
      </button>

      <button
        type="button"
        class="db-panel__action db-panel__action--backup"
        [disabled]="backupLoading || updateLoading"
        (click)="createBackup()">
        <span class="db-panel__action-icon" aria-hidden="true">
          <i class="fas fa-cloud-arrow-down"></i>
        </span>
        <span class="db-panel__action-text">
          <span class="db-panel__action-label">{{ ui.chromeLabel('dbBackupBtn') }}</span>
          <span class="db-panel__action-hint">{{ ui.chromeLabel('dbBackupHint') }}</span>
        </span>
        <span class="db-panel__action-spinner" *ngIf="backupLoading">
          <i class="fas fa-circle-notch fa-spin" aria-hidden="true"></i>
        </span>
      </button>

      <button
        type="button"
        class="db-panel__action db-panel__action--update"
        [disabled]="backupLoading || updateLoading"
        (click)="updateDatabase()">
        <span class="db-panel__action-icon" aria-hidden="true">
          <i class="fas fa-database"></i>
        </span>
        <span class="db-panel__action-text">
          <span class="db-panel__action-label">{{ ui.chromeLabel('dbUpdateBtn') }}</span>
          <span class="db-panel__action-hint">{{ ui.chromeLabel('dbUpdateHint') }}</span>
        </span>
        <span class="db-panel__action-spinner" *ngIf="updateLoading">
          <i class="fas fa-circle-notch fa-spin" aria-hidden="true"></i>
        </span>
      </button>

      <button
        type="button"
        class="db-panel__action db-panel__action--logout"
        [disabled]="backupLoading || updateLoading"
        (click)="logout()">
        <span class="db-panel__action-icon" aria-hidden="true">
          <i class="fas fa-right-from-bracket"></i>
        </span>
        <span class="db-panel__action-text">
          <span class="db-panel__action-label">{{ ui.chromeLabel('logoutBtn') }}</span>
          <span class="db-panel__action-hint">{{ ui.chromeLabel('logoutHint') }}</span>
        </span>
      </button>
    </nav>

    <p
      class="db-panel__status"
      *ngIf="statusMessage"
      [class.db-panel__status--error]="statusError"
      role="status">
      {{ statusMessage }}
    </p>
  </aside>
</div>
