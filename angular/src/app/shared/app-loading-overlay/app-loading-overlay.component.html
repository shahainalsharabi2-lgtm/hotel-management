@if (loading.active()) {
  <div
    class="app-load"
    [class.app-load--slow]="loading.slow()"
    role="status"
    [attr.aria-live]="loading.slow() ? 'assertive' : 'polite'"
    [attr.aria-busy]="true">
    <div class="app-load__bar" aria-hidden="true">
      <span class="app-load__bar-track"></span>
    </div>

    <div class="app-load__panel">
      <div class="app-load__ring" aria-hidden="true">
        <svg class="app-load__ring-svg" viewBox="0 0 48 48">
          <circle class="app-load__ring-bg" cx="24" cy="24" r="20" />
          <circle class="app-load__ring-arc" cx="24" cy="24" r="20" />
        </svg>
        @if (loading.slow()) {
          <button
            type="button"
            class="app-load__refresh"
            (click)="onRefresh()"
            [attr.title]="ui.chromeLabel('loadingRefreshTitle')"
            [attr.aria-label]="ui.chromeLabel('loadingRefreshAria')">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                fill="none"
                stroke="currentColor"
                stroke-width="1.75"
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M20 12a8 8 0 10-2.3 5.7M20 4v5h-5" />
            </svg>
          </button>
        }
      </div>

      <p class="app-load__text">
        {{
          loading.slow()
            ? ui.chromeLabel('loadingSlowHint')
            : ui.chromeLabel('loadingDataHint')
        }}
      </p>

      @if (loading.slow()) {
        <button type="button" class="app-load__action" (click)="onRefresh()">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              fill="none"
              stroke="currentColor"
              stroke-width="1.75"
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M20 12a8 8 0 10-2.3 5.7M20 4v5h-5" />
          </svg>
          <span>{{ ui.chromeLabel('loadingRefreshBtn') }}</span>
        </button>
      }
    </div>
  </div>
}
