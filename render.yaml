# Render Blueprint — بعد ربط GitHub: New → Blueprint → اختر هذا المستودع
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: hotel-api
    runtime: docker
    rootDir: aspnet-core
    plan: free
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: Database__Provider
        value: PostgreSql
      - key: ConnectionStrings__Default
        sync: false
      - key: App__SelfUrl
        value: https://hotel-api-fo0z.onrender.com
      - key: App__ClientUrl
        value: https://hotel-management.shahainalsharabi2.workers.dev
      - key: App__CorsOrigins
        value: https://hotel-management.shahainalsharabi2.workers.dev
      - key: AuthServer__Authority
        value: https://hotel-api-fo0z.onrender.com
      - key: AuthServer__RequireHttpsMetadata
        value: "true"
